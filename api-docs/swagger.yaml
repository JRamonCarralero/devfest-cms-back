    delete:
      summary: Delete a collaborator by ID
      description: Delete a collaborator by ID
      tags:
        - Collaborators
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/collaborators/event/{event-id}:
    get:
      summary: Get all collaborators for an event
      description: Get all collaborators for an event
      tags:
        - Collaborators
      parameters:
        - name: event-id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CollaboratorDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/collaborators/id/{id}:
    get:
      summary: Get a collaborator by ID
      description: Get a collaborator by ID
      tags:
        - Collaborators
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollaboratorDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/collaborators/event/{event-id}/paged:
    get:
      summary: Get all collaborators for an event with pagination
      description: Get all collaborators for an event with pagination
      tags:
        - Collaborators
      parameters:
        - name: event-id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          $ref: '#/components/schemas/CollaboratorDetailResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # --- Developers ---
  
  /api/v1/developer:
    post:
      summary: Create a developer
      description: Create a developer
      tags:
        - developers
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeveloperDTO'
      responses:
        '201':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeveloperResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/developer/{id}:
    put:
      summary: Update a developer by ID
      description: Update a developer by ID
      tags:
        - developers
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeveloperDTO'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
