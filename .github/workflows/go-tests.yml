name: Go Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.go'               
      - 'go.mod'              
      - 'go.sum'
      - 'internal/infrastructure/storage/migrations/**'
      - 'sqlc.yaml'            
      - '.github/workflows/**'

  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'internal/infrastructure/storage/migrations/**'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run Tests
        run: go test -v ./...